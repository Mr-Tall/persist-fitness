name: Persist Fitness CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/persist_fitness_ci
      AUTH_SECRET: ci-placeholder-secret
      AUTH_GOOGLE_ID: ci-placeholder-google-id
      AUTH_GOOGLE_SECRET: ci-placeholder-google-secret
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build