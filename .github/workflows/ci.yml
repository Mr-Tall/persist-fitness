name: Persist Fitness CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code and schema validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    env:
      # These values are syntactically valid but are never connected to production.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/persist_fitness_not_connected
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/persist_fitness_not_connected
      AUTH_SECRET: persist-fitness-ci-only-placeholder-secret
      AUTH_GOOGLE_ID: ci-placeholder-google-id
      AUTH_GOOGLE_SECRET: ci-placeholder-google-secret
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Require migration SQL for database schema changes
        if: github.event_name == 'pull_request'
        run: npm run prisma:check-migration -- --base "$BASE_SHA" --head "$HEAD_SHA"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PRISMA_SCHEMA_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'prisma-no-migration') }}
          PRISMA_SCHEMA_CHANGE_JUSTIFICATION: Maintainer approved via the prisma-no-migration pull request label.

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build production application
        run: npm run build

  migration-history:
    name: Disposable migration history
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: persist_fitness_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d persist_fitness_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/persist_fitness_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/persist_fitness_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate and validate Prisma client
        run: |
          npm run prisma:generate
          npm run prisma:validate

      - name: Apply migration history to disposable PostgreSQL
        run: npm run prisma:deploy

      - name: Verify one-active-workout partial unique index
        shell: bash
        run: |
          index_count="$(
            psql --dbname="$DIRECT_URL" --no-psqlrc --tuples-only --no-align --set ON_ERROR_STOP=1 --command "
              SELECT COUNT(*)
              FROM pg_index AS index_data
              JOIN pg_class AS index_class ON index_class.oid = index_data.indexrelid
              JOIN pg_class AS table_data ON table_data.oid = index_data.indrelid
              JOIN pg_namespace AS schema_data ON schema_data.oid = table_data.relnamespace
              WHERE schema_data.nspname = 'public'
                AND table_data.relname = 'Workout'
                AND index_class.relname = 'Workout_one_active_per_user_key'
                AND index_data.indisunique
                AND index_data.indisvalid
                AND index_data.indisready
                AND index_data.indnkeyatts = 1
                AND (
                  SELECT array_agg(attribute_data.attname ORDER BY key_data.ordinality)
                  FROM unnest(index_data.indkey) WITH ORDINALITY AS key_data(attnum, ordinality)
                  JOIN pg_attribute AS attribute_data
                    ON attribute_data.attrelid = table_data.oid
                   AND attribute_data.attnum = key_data.attnum
                  WHERE key_data.ordinality <= index_data.indnkeyatts
                ) = ARRAY['userId']::name[]
                AND pg_get_expr(index_data.indpred, index_data.indrelid) =
                  '(status = ''active''::text)';
            "
          )"
          test "$(printf '%s' "$index_count" | tr -d '[:space:]')" = "1" || {
            echo "Expected the one-active-workout partial unique index."
            exit 1
          }

      - name: Verify one-active-program partial unique index
        shell: bash
        run: |
          index_count="$(
            psql --dbname="$DIRECT_URL" --no-psqlrc --tuples-only --no-align --set ON_ERROR_STOP=1 --command "
              SELECT COUNT(*)
              FROM pg_index AS index_data
              JOIN pg_class AS index_class ON index_class.oid = index_data.indexrelid
              JOIN pg_class AS table_data ON table_data.oid = index_data.indrelid
              JOIN pg_namespace AS schema_data ON schema_data.oid = table_data.relnamespace
              WHERE schema_data.nspname = 'public'
                AND table_data.relname = 'ProgramEnrollment'
                AND index_class.relname = 'ProgramEnrollment_one_active_per_user_key'
                AND index_data.indisunique
                AND index_data.indisvalid
                AND index_data.indisready
                AND index_data.indnkeyatts = 1
                AND (
                  SELECT array_agg(attribute_data.attname ORDER BY key_data.ordinality)
                  FROM unnest(index_data.indkey) WITH ORDINALITY AS key_data(attnum, ordinality)
                  JOIN pg_attribute AS attribute_data
                    ON attribute_data.attrelid = table_data.oid
                   AND attribute_data.attnum = key_data.attnum
                  WHERE key_data.ordinality <= index_data.indnkeyatts
                ) = ARRAY['userId']::name[]
                AND pg_get_expr(index_data.indpred, index_data.indrelid) =
                  '(status = ''active''::text)';
            "
          )"
          test "$(printf '%s' "$index_count" | tr -d '[:space:]')" = "1" || {
            echo "Expected the one-active-program partial unique index."
            exit 1
          }

      - name: Verify migration history matches Prisma schema
        run: |
          npx prisma migrate diff \
            --from-url "$DIRECT_URL" \
            --to-schema-datamodel prisma/schema.prisma \
            --exit-code
